# Databricks Apps configuration for the DISA CTI demo app.

command:
  - "bash"
  - "-c"
  - |
    set -x
    echo "[boot] starting node backend/server.js"
    exec env NODE_OPTIONS='--max-old-space-size=1536' node backend/server.js

env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "8000"

  # SQL warehouse — for vibe-coded components and Genie SQL execution
  - name: DATABRICKS_HTTP_PATH
    valueFrom: "sql-warehouse"
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: "sql-warehouse"
  # CATALOG / SCHEMA / AGENT_ENDPOINT defaults — overwritten at deploy time
  # by notebook 06_deploy_app.ipynb with the per-user values from _workshop_config.
  - name: DATABRICKS_CATALOG
    value: "main"
  - name: DATABRICKS_SCHEMA
    value: "cti_default"

  # Compound agent endpoint
  - name: DATABRICKS_AGENT_ENDPOINT
    value: "disa-cti-agent-default"
  - name: DATABRICKS_AGENT_MAX_ACTIONS
    value: "5"

resources:
  sql_warehouse:
    - name: sql-warehouse
      id: "8186beb4c2a22a8f"
      permission: CAN_USE

  serving_endpoint:
    - name: agent-endpoint
      endpoint_name: "disa-cti-agent-default"  # overwritten at deploy time
      permission: CAN_QUERY
